services:
  # ─────────────────────────────────────────────
  # FastAPI Backend (ML inference engine)
  # ─────────────────────────────────────────────
  - type: web
    name: ecommerce-api
    runtime: python
    pythonVersion: "3.11.8"
    plan: starter
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MODEL_CACHE_SIZE
        value: "100"
      - key: PYTHON_VERSION
        value: "3.11.8"
    autoDeploy: true

  # ─────────────────────────────────────────────
  # Client Dashboard (Business Interface - Static)
  # ─────────────────────────────────────────────
  - type: static
    name: ecommerce-client
    staticPublishPath: ./client
    autoDeploy: true

  # ─────────────────────────────────────────────
  # Expert Portfolio (Data Science Interface - Static)
  # ─────────────────────────────────────────────
  - type: static
    name: ecommerce-expert
    staticPublishPath: ./expert
    autoDeploy: true
